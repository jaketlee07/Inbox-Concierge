name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          # Dummy values so lib/env.ts validation passes during build.
          # Real values are set in Vercel project settings.
          NODE_ENV: production
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
          ANTHROPIC_API_KEY: sk-ant-ci-dummy
          UPSTASH_REDIS_REST_URL: https://ci-dummy.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci-dummy
          DB_ENCRYPTION_KEY: ci-dummy-ci-dummy-ci-dummy-ci-dummy
          NEXT_PUBLIC_SUPABASE_URL: https://ci-dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy
